version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: ["dependencies", "github-actions"]
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: ["dependencies", "rust"]
    groups:
      rust-deps:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: ["dependencies", "python"]
    groups:
      python-deps:
        patterns:
          - "*"
